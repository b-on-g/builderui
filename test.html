<!doctype html>
<html mol_view_root>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">

<title>BuilderUI Studio</title>

<body mol_view_root>
	<script>
		;( function ( l ) {
			if( l.search[ 1 ] !== '/' ) return
			var decoded = l.search.slice( 1 ).split( '&' ).map( function ( s ) {
				return s.replace( /~and~/g, '&' )
			} ).join( '?' )
			window.history.replaceState( null, '', l.pathname.slice( 0, -1 ) + decoded + l.hash )
		} )( window.location )
	</script>
	<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
	<div mol_view_root="$bog_builderui_studio">
		<script src="web.js" charset="utf-8"></script>
	</div>

				<script src="/mol/build/client/client.js" charset="utf-8"></script>
				<script src="web.test.js" charset="utf-8"></script>
				<script>
					addEventListener( 'load', ()=> setTimeout( ()=> {
						const audit =  document.createElement( 'script' )
						audit.src = 'web.audit.js'
						document.head.appendChild( audit )
					}, 500 ) )
				</script>
				</body>
